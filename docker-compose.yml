services:
  documents-mcp:
    build: .
    ports:
      - "${DOCUMENTS_MCP_PORT:-3337}:8080"
    environment:
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:-}
      - DOCUMENT_INPUT_DIR=/documents/input
      - DOCUMENT_OUTPUT_DIR=/documents/output
      - WORKSPACES_ROOT=/workspaces
      - DOCUMENT_MAX_UPLOAD_BYTES=${DOCUMENT_MAX_UPLOAD_BYTES:-52428800}
      - DOCUMENT_ENABLE_OCR=${DOCUMENT_ENABLE_OCR:-true}
      - DOCUMENT_OCR_LANG=${DOCUMENT_OCR_LANG:-eng+fra}
      - DOCUMENT_FORCE_OCR=${DOCUMENT_FORCE_OCR:-false}
      # HTTPS — uncomment and provide files in ./certs/
      #- MCP_SSL_CERTFILE=/certs/server.crt
      #- MCP_SSL_KEYFILE=/certs/server.key
    volumes:
      - ${DOCUMENT_INPUT_HOST_DIR:-./documents/input}:/documents/input
      - ${DOCUMENT_OUTPUT_HOST_DIR:-./documents/output}:/documents/output
      - ${WORKSPACES_ROOT:?Set WORKSPACES_ROOT to the directory containing all workspaces}:/workspaces
      # TLS certificates — uncomment if MCP_SSL_CERTFILE is set
      #- ./certs:/certs:ro
    restart: unless-stopped
